# nginx.conf – WINLAB production configuration
# Place in /etc/nginx/sites-available/winlab

server {
    listen 80;
    listen [::]:80;
    server_name winlab.cloud www.winlab.cloud;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name winlab.cloud www.winlab.cloud;

    # SSL certificates (Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/winlab.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winlab.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # Content Security Policy
    # script-src: 'unsafe-inline' required for inline <script> blocks in coming-soon/index.html
    # frame-src: Stripe payment iframe (js.stripe.com)
    # connect-src: own API + Stripe API calls
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' https://js.stripe.com 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: https:;
        connect-src 'self' https://api.stripe.com https://fonts.googleapis.com https://login.microsoftonline.com https://graph.microsoft.com;
        frame-src https://js.stripe.com;
        worker-src 'self' blob:;
        object-src 'none';
        base-uri 'self';
        form-action 'self' https://js.stripe.com;
        upgrade-insecure-requests;
    " always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        image/svg+xml;

    # Root – serve the Vite build output
    root /var/www/winlab/dist;
    index index.html;

    # ── API reverse proxy (Node.js backend on port 3001) ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Static assets – long-term caching ──
    location /dist/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── PWA / non-hashed assets ──
    location ~* \.(ico|png|jpg|jpeg|svg|webp|webmanifest|js|css)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Vary "Accept-Encoding";
    }

    # ── SPA fallback – all non-API, non-static routes → index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block hidden admin route from bots (defense in depth) ──
    location = /myrooting {
        try_files $uri $uri/ /index.html;
    }

    # ── Robots.txt ──
    location = /robots.txt {
        alias /var/www/winlab/public/robots.txt;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Sitemap ──
    location = /sitemap.xml {
        alias /var/www/winlab/coming-soon/sitemap.xml;
        add_header Cache-Control "public, max-age=86400";
        default_type application/xml;
    }

    # ── Enterprise landing page ──
    location = /enterprise {
        alias /var/www/winlab/coming-soon/enterprise-landing.html;
        add_header Cache-Control "public, max-age=3600";
        default_type text/html;
    }

    # ── Enterprise trust center ──
    location = /enterprise/trust {
        alias /var/www/winlab/coming-soon/trust-center.html;
        add_header Cache-Control "public, max-age=3600";
        default_type text/html;
    }

    # ── Microsoft OAuth2 callback (proxy to backend) ──
    location = /api/auth/microsoft/callback {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
