  <style>
    body { margin: 0; background: #050505; }
    #lcp-skeleton {
      font-family: 'Courier New', monospace;
      background: #050505;
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: 12px;
      padding: 20px 24px;
      color: #4ade80;
      font-size: 13px;
      line-height: 1.7;
      min-height: 280px;
      max-width: 600px;
      margin: 80px auto 0;
    }
    #lcp-skeleton .e { color: #f87171; }
    #lcp-skeleton .d { color: #475569; }
    #lcp-skeleton .b { color: #93c5fd; }
    #root:not(:empty) + * { display: none; }
  </style>

  <title>WinLab - Break Real Servers. Become Job-Ready.</title>
</head>
<body>
  <div id="lcp-skeleton" class="skeleton loading" aria-hidden="true">
    <div class="d">Last login: Mon Apr 20 21:00:02 2026 from 10.0.2.10</div>
    <div class="d">---------------------------------------------</div>
    <div>&nbsp;</div>
    <div class="e">ALERT - Apache web server is DOWN</div>
    <div class="e">HTTP 502 - users affected - SLA breach in 4 min</div>
    <div>&nbsp;</div>
    <div>root@prod-server:~# <span style="display:inline-block;width:8px;height:14px;background:#4ade80;vertical-align:middle;"></span></div>
    <div>&nbsp;</div>
    <div class="b">AI Mentor: Check the service status first, then bring it back up.</div>
  </div>

  <a href="#main-content" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">
    Skip to main content
  </a>

  <div id="root" role="document" aria-label="WinLab Application"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    new MutationObserver(function(mutations, observer) {
      if (document.getElementById('root').childNodes.length > 0) {
        var skeleton = document.getElementById('lcp-skeleton');
        if (skeleton) skeleton.style.display = 'none';
        observer.disconnect();
      }
    }).observe(document.getElementById('root'), { childList: true });
  </script>
</body>
