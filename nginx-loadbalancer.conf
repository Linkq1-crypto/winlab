# WINLAB — NGINX Load Balancer + Reverse Proxy
# Place in /etc/nginx/sites-available/winlab

upstream winlab_backend {
    # Least connections — best for stateful apps
    least_conn;

    # ── 3 backend nodes (replace IPs with your actual server IPs) ──────────
    server NODE1_IP:3001 weight=3 max_fails=3 fail_timeout=30s;
    server NODE2_IP:3001 weight=2 max_fails=3 fail_timeout=30s;
    server NODE3_IP:3001 weight=1 max_fails=3 fail_timeout=30s backup;

    # Keepalive connections to backend
    keepalive 32;
}

# ── HTTP → HTTPS Redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name winlab.cloud www.winlab.cloud;
    return 301 https://$host$request_uri;
}

# ── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name winlab.cloud www.winlab.cloud;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/winlab.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winlab.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Health Check Endpoint (for monitoring) ──────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── API Reverse Proxy (with load balancing) ────────────────────────────
    location /api/ {
        proxy_pass http://winlab_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Retry on node failure (failover)
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    # ── Static Assets (served directly by Nginx) ──────────────────────────
    root /var/www/winlab/dist;
    index index.html;

    location /dist/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location ~* \.(ico|png|jpg|jpeg|svg|webp|webmanifest|js|css)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header Vary "Accept-Encoding";
    }

    # ── SPA Fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hidden Admin Route ────────────────────────────────────────────────
    location /myrooting {
        try_files $uri $uri/ /index.html;
    }

    # ── Robots.txt ────────────────────────────────────────────────────────
    location = /robots.txt {
        alias /var/www/winlab/public/robots.txt;
        add_header Cache-Control "public, max-age=86400";
    }
}
